# ============================================================================
# General Honeypot Options
# ============================================================================
[honeypot]

# Sensor name is used to identify this honeypot instance. Used by the database
# logging modules such as JSON.
#
# If not specified, the logging modules will instead use the IP address of the
# server as the sensor name.
#
# (default: the name of the local machine)
sensor_name = t-pot

# The version of Elasticsearch reported by the honeypot.
#
# (default: 1.4.1)
#spoofed_version = 1.4.1

# The Elasticsearch instance name reported by the honeypot.
#
# (default = Green Goblin)
instance_name = elasticsearch

# The name of the simulated Elasticsearch cluster
#
# (default = elasticsearch
cluster_name = elasticsearch

# The name of the simulated host running Elasticsearch
#
# (default = elk)
host_name = es

# The build number of the simulated Elasticsearch instance
# Use something realistic or simply don't touch this value
#
# (default = 89d3241)
#build = 89d3241

# The number of processors on the simulated host
#
# (default = 12)
#total_processors = 12

# The total number of CPU cores on the simulated host
# Use a multiple of total_processors
#
# (default = 24)
#total_cores = 24

# The total number of sockets on the simulated host
# Use a multiple of total_cores
#
# (default = 48)
#total_sockets = 48

# The MAC address of the networking card of the simulated host
#
# (default = 08:01:c7:3F:15:DD)
#mac_address = 08:01:c7:3F:15:DD

# Directory where to save log files in.
# Log files are <log_filename>.YYYY-MM-DD in that directory
#
# (default: log)
log_path = log

# Log file name
#
# (default: stdout)
#log_filename =

# Directory containing the response files
#
# (default: responses)
#responses_dir = responses

# ============================================================================
# Network Specific Options
# ============================================================================

# Port to listen for incoming connections.
#
# (default: 9200)
#listen_port = 9200

# Site to query for one's public IP address
#
# (default: https://ident.me)
#public_ip_url = https://ident.me

# Enable to log the public IP of the honeypot (useful if listening on 127.0.0.1)
# IP address is obtained by querying public_ip_url
#
# (default: false)
#report_public_ip = false

# A comma-separated list of networks, connection from whose IPs won't be logged
#
# (default: 127.0.0.1,192.168.0.0/16)
#blacklist=127.0.0.1,192.168.0.0/16


# ============================================================================
# Output Plugins
# These provide an extensible mechanism to send audit log entries to third
# parties. The audit entries contain information on clients connecting to
# the honeypot.
#
# Output entries need to start with 'output_' and have the 'enabled' entry.
# ============================================================================

# CouchDB logging module
#
#[output_couch]
#enabled = false
# Optional transport scheme: http (default) or https
#scheme = http
#host = localhost
#port = 5984
#username = elasticpot
#password = secret
#database = elasticpot
#geoip = true
# Location of the databases used for geolocation
#geoip_citydb = data/GeoLite2-City.mmdb
#geoip_asndb = data/GeoLite2-ASN.mmdb

# Datadog logging module
# sends JSON directly to Datadog
# mandatory field: api_key
# optional fields (fallback configured in module): ddsource, ddtags, service
# For more information on fields https://docs.datadoghq.com/api/latest/logs/#send-logs
#
#[output_datadog]
#enabled = false
#url = https://http-intake.logs.datadoghq.com/api/v2/logs
# Verify TLS certificates and hostnames for HTTPS connections (default: true)
#verify_tls = true
# Optional path to a PEM CA bundle (used when verify_tls = true)
#ca_certs = /path/to/ca-bundle.pem
#api_key = abcdef1234567890fedcba0987654321
#ddsource = elasticpot
#ddtags = env:dev
#service = honeypot
# Host from which the logs are connected, default - current hostname
#hostname = pandora.nlcv.bas.bg

# Discord logging module
#
#[output_discord]
#enabled = false
# Verify TLS certificates and hostnames for HTTPS connections (default: true)
#verify_tls = true
# Optional path to a PEM CA bundle (used when verify_tls = true)
#ca_certs = /path/to/ca-bundle.pem
# Delay between messages (for rate limiting)
#delay = 2.0
#url = https://discord.com/api/webhooks/id/token

# Elasticsearch logging module
#
#[output_elastic]
#enabled = false
#host = localhost
#port = 9200
#index = elasticpot
#
# set pipeline = geoip to map src_ip to
# geo location data. You can use a custom
# pipeline but you must ensure it exists
# in elasticsearch.
#
#pipeline = geoip
#
# Authentication. When x-pack.security is enabled
# in ES, default users have been created and requests
# must be authenticated.
#
# Credentials
#
#username = elasticpot
#password = secret
#
# TLS encryption. Communications between the client (elasticpot)
# and the ES server should naturally be protected by encryption
# if requests are authenticated (to prevent from man-in-the-middle
# attacks). The following options are then paramount
# if username and password are provided.
#
# use ssl/tls
#ssl = true
# verify SSL certificates
#verify_certs = true
# Path to trusted CA certs on disk
#ca_certs = /path/to/cert/file/elastic_ca.crt

# HPFeeds
#
# Note the lack of "s" at the end:
#[output_hpfeed]
#enabled = false
#server = hpfeeds.mysite.org
#tlscert = /path/to/tls/cert/file
#port = 10000
#identifier = abc123
#secret = secret
#channel = elasticpot

# InfluxDB 2.0 logging module
#
#[output_influx2]
#enabled = false
#host = hostname
#token = token
#org = organization
#bucket = elasticpot

# JSON based logging module
#
[output_jsonlog]
enabled = true
logfile = log/elasticpot.json
epoch_timestamp = false

# Kafka logging module
#
#[output_kafka]
#enabled = false
#host = 127.0.0.1
#port = 9092
#topic = elasticpot
#username =
#password =
#debug = false

# MongoDB logging module
#
#[output_mongodb]
#enabled = false
#host = 127.0.0.1
#username = elasticpot
#password = secret
#database = elasticpot
# Note: .format(username, password, host) is done on the following string,
#  so make sure that there are exactly 3 placeholders ({}) in it
#connection_string = mongodb+srv://{}:{}@{}/?retryWrites=true&w=majority&appName=Cluster0
# Whether to store geolocation data in the database
#geoip = true
# Location of the databases used for geolocation
#geoip_citydb = data/GeoLite2-City.mmdb
#geoip_asndb = data/GeoLite2-ASN.mmdb

# MySQL logging module
# Database structure for this module is supplied in docs/mysql/mysql.sql
#
# MySQL logging requires extra software: sudo apt-get install libmysqlclient-dev
# MySQL logging requires an extra Python module: pip install mysql-python
#
#[output_mysql]
#enabled = false
#host = localhost
#database = elasticpot
#username = elasticpot
#password = secret
#port = 3306
#debug = false
# Connection timeout (default: 10)
#connect_timeout = 10
# Read timeout (default: 30)
#read_timeout = 30
# Write timeout (default: 30)
#write_timeout = 30
# Max threads (default: 5)
#cp_max = 5
# Log a warning if the queue length exceeds this value (default: 100)
#pending_warn_threshold = 100
# Whether to store geolocation data in the database
#geoip = true
# Location of the databases used for geolocation
#geoip_citydb = data/GeoLite2-City.mmdb
#geoip_asndb = data/GeoLite2-ASN.mmdb

# NLCV-BAS honeypot data aggregation API
#
#[output_nlcvapi]
#enabled = false
#host = https://api.nlcv.bas.bg/v1.0/honeypot
# Verify TLS certificates and hostnames for HTTPS connections (default: true)
#verify_tls = true
# Optional path to a PEM CA bundle (used when verify_tls = true)
#ca_certs = /path/to/ca-bundle.pem
# Whether to store geolocation data in the database
#geoip = true
# Location of the databases used for geolocation
#geoip_citydb = data/GeoLite2-City.mmdb
#geoip_asndb = data/GeoLite2-ASN.mmdb

# PostgreSQL logging module
#
#[output_postgres]
#enabled = false
#host = hostname
#username = elasticpot
#password = secret
#port = 5432
#database = elasticpot
#debug = false
# Whether to store geolocation data in the database
#geoip = true
# Location of the databases used for geolocation
#geoip_citydb = data/GeoLite2-City.mmdb
#geoip_asndb = data/GeoLite2-ASN.mmdb

# RedisDB logging module
#
#[output_redisdb]
#enabled = false
#debug = true
#host = 127.0.0.1
# Password of the redis server. Defaults to None
#password = secret
# Name of the list to push to or the channel to publish to. Required
#keyname = elasticpot

# Rethinkdb logging module
#
#[output_rethinkdblog]
#enabled = false
#host = 127.0.0.1
#port = 28015
#table = events
#db = elasticpot
#user = admin
#password =

# Slack logging module
# This will produce a _lot_ of messages - you have been warned....
#
#[output_slack]
#enabled = false
#channel = channel_that_events_should_be_posted_in
#token = slack_token_for_your_bot
# Delay between messages (for rate limiting)
#delay = 1.2

# Socket logging module
#
#[output_socketlog]
#enabled = false
#address = 127.0.0.1:9000
#timeout = 5

# SQLite3 logging module
#
# Logging to SQLite3 database. To init the database, use the script
# docs/mysql/sqlite3.sql:
#     sqlite3 log/elasticpot.db < docs/sqlite3/sqlite3.sql
#
#[output_sqlite]
#enabled = false
#debug = false
#db_file = log/elasticpot.db
# Whether to store geolocation data in the database
#geoip = true
# Location of the databases used for geolocation
#geoip_citydb = data/GeoLite2-City.mmdb
#geoip_asndb = data/GeoLite2-ASN.mmdb

# Local Syslog logging module
#
# This sends log messages to the local syslog daemon.
#
#[output_localsyslog]
#enabled = false
# Facility can be:
# KERN, USER, MAIL, DAEMON, AUTH, LPR, NEWS, UUCP, CRON, SYSLOG and LOCAL0 to LOCAL7.
#
# default: USER
#facility = USER

# Telegram logging module
# 1. Create a bot following https://core.telegram.org/bots#6-botfather to get token.
# 2. Send message to your bot, then use https://api.telegram.org/bot{bot_token}/getUpdates to find chat_id.
#
#[output_telegram]
#enabled = false
# Verify TLS certificates and hostnames for HTTPS connections (default: true)
#verify_tls = true
# Optional path to a PEM CA bundle (used when verify_tls = true)
#ca_certs = /path/to/ca-bundle.pem
#bot_token = 123456789:AbCDEfGhiJkLmnOpQRstUVWxYZ
#chat_id = 987654321
# Delay between messages (for rate limiting)
#delay = 2.0

# Text logging module
# This writes audit log entries to a text file
#
#[output_textlog]
#enabled = false
#logfile = log/elasticpot.txt

# XMPP logging module
#
#[output_xmpp]
#enabled = false
#server = conference.elasticpot.local
#user = elasticpot@elasticpot.local
#password = secret
#muc = hacker_room


